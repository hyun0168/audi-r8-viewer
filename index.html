<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi R8 — ALIAS 3D VIEWER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c10;
    --surface: #13131a;
    --border: rgba(255,255,255,0.07);
    --accent: #b8a898;
    --accent-dim: rgba(184,168,152,0.45);
    --text: #ddd8d0;
    --text-dim: rgba(221,216,208,0.45);
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--mono); overflow:hidden; }

  #app { display:flex; flex-direction:column; height:100vh; }

  #topbar {
    display:flex; align-items:center; gap:16px;
    padding:0 20px; height:48px;
    border-bottom:0.5px solid var(--border);
    background:var(--surface);
    flex-shrink:0; z-index:20;
  }

  #logo { font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:0.18em; color:var(--accent); white-space:nowrap; }
  .div  { width:0.5px; height:20px; background:var(--border); flex-shrink:0; }
  #model-name { font-size:11px; color:var(--text-dim); letter-spacing:0.05em; flex:1; }

  #btn-group { display:flex; gap:6px; align-items:center; }

  .btn {
    height:28px; padding:0 12px;
    background:transparent;
    border:0.5px solid rgba(255,255,255,0.1);
    border-radius:5px;
    color:var(--text-dim);
    font-family:var(--mono); font-size:10px; letter-spacing:0.1em;
    cursor:pointer; transition:all 0.15s; white-space:nowrap;
  }
  .btn:hover { background:rgba(255,255,255,0.06); color:var(--text); border-color:rgba(255,255,255,0.18); }
  .btn.on   { background:rgba(184,168,152,0.12); border-color:var(--accent-dim); color:var(--accent); }

  #env-dots { display:flex; gap:7px; align-items:center; margin-left:4px; }
  .edot {
    width:13px; height:13px; border-radius:50%;
    cursor:pointer; border:1.5px solid transparent; transition:border-color 0.15s; flex-shrink:0;
  }
  .edot:hover, .edot.on { border-color:var(--accent); }

  #canvas-wrap { position:relative; flex:1; overflow:hidden; }
  #three-canvas { display:block; width:100%; height:100%; }

  /* LOADING */
  #loading {
    position:absolute; inset:0;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    z-index:15;
  }
  #loading.hidden { display:none !important; }
  #load-title { font-family:var(--sans); font-size:16px; font-weight:700; letter-spacing:0.1em; color:var(--text); }
  #load-label { font-size:10px; letter-spacing:0.12em; color:var(--text-dim); }
  #load-track { width:200px; height:1.5px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
  #load-fill  { height:100%; background:var(--accent); width:0%; transition:width 0.2s; border-radius:2px; }

  #hud {
    position:absolute; bottom:16px; left:18px;
    font-size:10px; color:rgba(184,168,152,0.28);
    letter-spacing:0.05em; line-height:2;
    pointer-events:none; z-index:5;
  }

  #err {
    position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
    background:rgba(220,70,70,0.15); border:0.5px solid rgba(220,70,70,0.35);
    color:#f09090; padding:7px 18px; border-radius:6px;
    font-size:11px; letter-spacing:0.05em;
    z-index:30; display:none; white-space:nowrap;
  }

  #bottombar {
    height:36px; display:flex; align-items:center; justify-content:space-between;
    padding:0 20px;
    border-top:0.5px solid var(--border);
    background:rgba(10,10,14,0.95);
    flex-shrink:0; z-index:20;
  }
  #bottombar span { font-size:10px; color:var(--text-dim); letter-spacing:0.05em; }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div id="logo">ALIAS 3D VIEWER</div>
    <div class="div"></div>
    <div id="model-name">Audi R8 — Practice Modeling</div>
    <div id="btn-group">
      <div id="env-dots">
        <div class="edot on" style="background:#0e0e14;" data-env="dark" title="다크"></div>
        <div class="edot" style="background:#dcd8d0;" data-env="light" title="라이트"></div>
        <div class="edot" style="background:#141c14;" data-env="studio" title="스튜디오"></div>
      </div>
      <div class="div" style="margin:0 2px;"></div>
      <button class="btn on" id="btn-auto">AUTO ROT</button>
      <button class="btn" id="btn-patch">PATCH LINE</button>
      <button class="btn" id="btn-reset">RESET</button>
      <button class="btn" id="btn-shot">SCREENSHOT</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>

    <div id="loading">
      <div id="load-title">AUDI R8</div>
      <div id="load-label">LOADING MODEL...</div>
      <div id="load-track"><div id="load-fill"></div></div>
    </div>

    <div id="hud">
      좌클릭 드래그 — 회전<br>
      우클릭 드래그 — 이동<br>
      스크롤 — 줌
    </div>
    <div id="err"></div>
  </div>

  <div id="bottombar">
    <span>Powered by Three.js</span>
    <span>ALIAS Surface Modeling Practice</span>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
(function () {
  let scene, camera, renderer;
  let model = null, edgeGroup = null;
  let autoRot = true, showPatch = false, envKey = 'dark';

  const ENVS = {
    dark:   { bg: 0x0e0e14, amb: 0.55, dir1: 0xffffff, dir2: 0xc0b8b0 },
    light:  { bg: 0xdcd8d0, amb: 0.80, dir1: 0xffffff, dir2: 0xe8e0d8 },
    studio: { bg: 0x141c14, amb: 0.50, dir1: 0xffffff, dir2: 0xa0c0a0 },
  };

  const canvasEl  = document.getElementById('three-canvas');
  const wrap      = document.getElementById('canvas-wrap');
  const loadEl    = document.getElementById('loading');
  const loadFill  = document.getElementById('load-fill');
  const errEl     = document.getElementById('err');
  const btnAuto   = document.getElementById('btn-auto');
  const btnPatch  = document.getElementById('btn-patch');
  const btnReset  = document.getElementById('btn-reset');
  const btnShot   = document.getElementById('btn-shot');

  let ambLight, dirLight1, dirLight2;
  const orb = { theta: 0.5, phi: 1.05, radius: 5, panX: 0, panY: 0 };

  function init() {
    try {
      if (typeof THREE === 'undefined') {
        showErr('엔진 로드 실패');
        return;
      }
      
      scene = new THREE.Scene();
      const W = wrap.clientWidth || window.innerWidth;
      const H = wrap.clientHeight || window.innerHeight;
      camera = new THREE.PerspectiveCamera(42, W / H, 0.01, 2000);

      renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(W, H);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      
      renderer.outputColorSpace = 'srgb';
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.15;

      ambLight  = new THREE.AmbientLight(0xffffff, 0.55);
      dirLight1 = new THREE.DirectionalLight(0xffffff, 1.3);
      dirLight1.position.set(4, 6, 5);
      dirLight1.castShadow = true;
      dirLight2 = new THREE.DirectionalLight(0xc0b8b0, 0.5);
      dirLight2.position.set(-4, 2, -3);
      const rim = new THREE.DirectionalLight(0xffffff, 0.2);
      rim.position.set(0, -3, -4);
      scene.add(ambLight, dirLight1, dirLight2, rim);

      applyEnv();
      updateCamera();
      animate();
      onResize();
      window.addEventListener('resize', onResize);
      bindOrbit();

      loadGLB('audi_r8_modeling_1-19_GLB2.glb');
    } catch (e) {
      console.error(e);
      showErr('뷰어 초기화 실패');
    }
  }

  function applyEnv() {
    const e = ENVS[envKey];
    if(scene) scene.background = new THREE.Color(e.bg);
    if(ambLight) ambLight.intensity = e.amb;
    if(dirLight1) dirLight1.color.set(e.dir1);
    if(dirLight2) dirLight2.color.set(e.dir2);
  }

  function updateCamera() {
    if(!camera) return;
    const { theta, phi, radius, panX, panY } = orb;
    const sp = Math.sin(phi);
    camera.position.set(
      radius * sp * Math.sin(theta) + panX,
      radius * Math.cos(phi)        + panY,
      radius * sp * Math.cos(theta)
    );
    camera.lookAt(panX, panY, 0);
  }

  function animate() {
    requestAnimationFrame(animate);
    if (autoRot && model) {
      model.rotation.y += 0.003;
      if (edgeGroup) edgeGroup.rotation.y = model.rotation.y;
    }
    if(renderer && scene && camera) renderer.render(scene, camera);
  }

  function onResize() {
    if(!camera || !renderer || !wrap) return;
    const W = wrap.clientWidth || window.innerWidth;
    const H = wrap.clientHeight || window.innerHeight;
    camera.aspect = W / H; camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  }

  function bindOrbit() {
    let down = false, right = false, px = 0, py = 0;
    canvasEl.addEventListener('mousedown', e => {
      down = true; right = e.button === 2;
      px = e.clientX; py = e.clientY;
      if (e.button === 0) { autoRot = false; btnAuto.classList.remove('on'); }
    });
    window.addEventListener('mouseup', () => down = false);
    window.addEventListener('mousemove', e => {
      if (!down) return;
      const dx = e.clientX - px, dy = e.clientY - py;
      px = e.clientX; py = e.clientY;
      if (right) { orb.panX -= dx * 0.004 * (orb.radius / 4); orb.panY += dy * 0.004 * (orb.radius / 4); }
      else { orb.theta -= dx * 0.007; orb.phi = Math.max(0.05, Math.min(Math.PI - 0.05, orb.phi + dy * 0.007)); }
      updateCamera();
    });
    canvasEl.addEventListener('wheel', e => {
      e.preventDefault();
      orb.radius = Math.max(0.2, Math.min(200, orb.radius + e.deltaY * 0.012));
      updateCamera();
    }, { passive: false });
    canvasEl.addEventListener('contextmenu', e => e.preventDefault());
  }

  function loadGLB(path) {
    let prog = 0;
    const ticker = setInterval(() => { prog = Math.min(prog + 3, 90); if(loadFill) loadFill.style.width = prog + '%'; }, 130);

    if (typeof THREE.GLTFLoader !== 'function' || typeof THREE.DRACOLoader !== 'function') {
      clearInterval(ticker);
      showErr('로더 구성 요소를 찾을 수 없습니다.');
      return;
    }

    const loader = new THREE.GLTFLoader();
    
    // 구글 CDN을 통해 Draco 압축 해제기(Decoder) 연동 설정
    const dracoLoader = new THREE.DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.3/');
    loader.setDRACOLoader(dracoLoader);

    loader.load(path, gltf => {
      clearInterval(ticker);
      if(loadFill) loadFill.style.width = '100%';

      model = gltf.scene;
      const box  = new THREE.Box3().setFromObject(model);
      const ctr  = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxD = Math.max(size.x, size.y, size.z);
      const sc   = 3.5 / maxD;
      model.position.sub(ctr).multiplyScalar(sc);
      model.scale.setScalar(sc);
      scene.add(model);

      orb.radius = 5; orb.panX = 0; orb.panY = 0;
      orb.theta = 0.5; orb.phi = 1.05;
      updateCamera();

      buildEdges(model);
      setTimeout(() => { if(loadEl) loadEl.classList.add('hidden'); }, 400);

    }, xhr => {
      if (xhr.total && loadFill) { prog = Math.round(xhr.loaded / xhr.total * 90); loadFill.style.width = prog + '%'; }
    }, err => {
      clearInterval(ticker);
      console.error(err);
      showErr('모델 파일 리딩 실패. 경로 및 확장자를 확인하세요.');
    });
  }

  function buildEdges(root) {
    if (edgeGroup) { scene.remove(edgeGroup); edgeGroup = null; }
    edgeGroup = new THREE.Group();

    root.traverse(child => {
      if (!child.isMesh) return;
      const edges = new THREE.EdgesGeometry(child.geometry, 15);
      const mat   = new THREE.LineBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.5 });
      const lines = new THREE.LineSegments(edges, mat);
      lines.position.copy(child.position);
      lines.rotation.copy(child.rotation);
      lines.scale.copy(child.scale);
      edgeGroup.add(lines);
    });

    edgeGroup.position.copy(root.position);
    edgeGroup.rotation.copy(root.rotation);
    edgeGroup.scale.copy(root.scale);
    edgeGroup.visible = showPatch;
    scene.add(edgeGroup);
  }

  if(btnAuto) btnAuto.addEventListener('click', () => { autoRot = !autoRot; btnAuto.classList.toggle('on', autoRot); });
  if(btnPatch) btnPatch.addEventListener('click', () => {
    showPatch = !showPatch;
    btnPatch.classList.toggle('on', showPatch);
    if (edgeGroup) edgeGroup.visible = showPatch;
  });
  if(btnReset) btnReset.addEventListener('click', () => {
    if (!model) return;
    orb.radius = 5; orb.panX = 0; orb.panY = 0; orb.theta = 0.5; orb.phi = 1.05;
    model.rotation.set(0, 0, 0);
    if (edgeGroup) edgeGroup.rotation.set(0, 0, 0);
    updateCamera();
    autoRot = true; if(btnAuto) btnAuto.classList.add('on');
  });
  if(btnShot) btnShot.addEventListener('click', () => {
    if(!renderer || !scene || !camera) return;
    renderer.render(scene, camera);
    const a = document.createElement('a');
    a.download = 'audi_r8_alias.png';
    a.href = canvasEl.toDataURL('image/png');
    a.click();
  });

  document.querySelectorAll('.edot').forEach(dot => {
    dot.addEventListener('click', function () {
      document.querySelectorAll('.edot').forEach(d => d.classList.remove('on'));
      this.classList.add('on');
      envKey = this.dataset.env;
      applyEnv();
    });
  });

  function showErr(msg) { if(errEl) { errEl.textContent = msg; errEl.style.display = 'block'; } }

  if (document.readyState === 'complete' || document.readyState === 'interactive') { init(); }
  else { document.addEventListener('DOMContentLoaded', init); }
})();
</script>
</body>
</html>
