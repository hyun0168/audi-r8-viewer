<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi R8 — ALIAS 3D VIEWER (Performance Mode)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #16171d; --surface: #1d1e26; --border: rgba(255,255,255,0.07); --accent: #b8a898; --accent-dim: rgba(184,168,152,0.45); --text: #ddd8d0; --text-dim: rgba(221,216,208,0.45); --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif; }
  html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--mono); overflow:hidden; }
  #app { display:flex; flex-direction:column; height:100vh; }
  #topbar { display:flex; align-items:center; gap:16px; padding:0 20px; height:48px; border-bottom:0.5px solid var(--border); background:var(--surface); flex-shrink:0; z-index:20; }
  #logo { font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:0.18em; color:var(--accent); }
  .div { width:0.5px; height:20px; background:var(--border); }
  #btn-group { display:flex; gap:6px; align-items:center; }
  .btn { height:28px; padding:0 12px; background:transparent; border:0.5px solid rgba(255,255,255,0.1); border-radius:5px; color:var(--text-dim); font-size:10px; cursor:pointer; }
  .btn.on { background:rgba(184,168,152,0.12); border-color:var(--accent-dim); color:var(--accent); }
  #canvas-wrap { position:relative; flex:1; overflow:hidden; }
  #three-canvas { display:block; width:100%; height:100%; }
  #loading { position:absolute; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:15; }
  #loading.hidden { display:none !important; }
  #load-fill { height:1.5px; background:var(--accent); width:0%; transition:width 0.2s; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">ALIAS 3D VIEWER</div>
    <div class="div"></div>
    <div id="btn-group">
      <button class="btn on" id="btn-auto">AUTO ROT</button>
      <button class="btn" id="btn-patch">PATCH HIGHLIGHT</button>
      <button class="btn" id="btn-reset">RESET</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div id="loading"><div id="load-fill" style="width:200px;"></div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
(function () {
  let scene, camera, renderer, model;
  let autoRot = true, enableHighlight = false, isInteracting = false;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let intersectedMesh = null;

  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x16171d);
    camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
    renderer.setPixelRatio(1.2); // ⚡ 픽셀 밀도 제한으로 성능 확보
    renderer.shadowMap.enabled = false; // ⚡ 실시간 그림자 연산 전면 차단
    
    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);
    
    loadModel();
    animate();
  }

  function loadModel() {
    const loader = new THREE.GLTFLoader();
    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
    loader.setDRACOLoader(draco);

    loader.load('audi.glb', (gltf) => {
      model = gltf.scene;
      model.traverse(node => {
        if (node.isMesh) {
          node.matrixAutoUpdate = false; // ⚡ 정적 메쉬 좌표 계산 중단
          node.updateMatrix();
        }
      });
      scene.add(model);
      document.getElementById('loading').classList.add('hidden');
    });
  }

  function checkRaycast() {
    // ⚡ 하이라이트 기능이 꺼져있거나 드래그 중이면 연산 진입 불가
    if (!enableHighlight || isInteracting || !model) return;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(model.children, true);
    if (intersects.length > 0) {
      if (intersectedMesh !== intersects[0].object) {
        if(intersectedMesh) intersectedMesh.material.emissive.setHex(0x000000);
        intersectedMesh = intersects[0].object;
        intersectedMesh.material.emissive.setHex(0x1a66ff);
      }
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    checkRaycast();
    if (autoRot && model && !isInteracting) model.rotation.y += 0.002;
    renderer.render(scene, camera);
  }

  // ⚡ 토글 버튼 로직
  document.getElementById('btn-patch').addEventListener('click', (e) => {
    enableHighlight = !enableHighlight;
    e.target.classList.toggle('on', enableHighlight);
    if(!enableHighlight && intersectedMesh) intersectedMesh.material.emissive.setHex(0x000000);
  });

  // ⚡ 마우스 조작 인터록
  window.addEventListener('mousedown', () => isInteracting = true);
  window.addEventListener('mouseup', () => isInteracting = false);
  window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  init();
})();
</script>
</body>
</html>
